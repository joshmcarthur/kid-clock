script:
  - id: update_schedule_state
    mode: restart
    then:
      - lambda: |-
          auto in_rule_period = [](int current_mins, int start_mins, int end_mins) -> bool {
            if (start_mins == end_mins) {
              return current_mins == start_mins;
            }
            if (start_mins < end_mins) {
              return current_mins >= start_mins && current_mins < end_mins;
            }
            return current_mins >= start_mins || current_mins < end_mins;
          };

          struct RuleState {
            bool enabled;
            int start_mins;
            int end_mins;
            int priority;
            int display_mode;
            bool green_on;
            bool red_on;
          };

          auto load_rule = [&](int index, RuleState &rule) -> void {
            rule.enabled = false;
            rule.start_mins = 0;
            rule.end_mins = 0;
            rule.priority = 99;
            rule.display_mode = 0;
            rule.green_on = false;
            rule.red_on = false;
            switch (index) {
              case 0:
                rule.enabled = id(rule_0_enabled).state > 0;
                rule.start_mins = (int) id(rule_0_start_mins).state;
                rule.end_mins = (int) id(rule_0_end_mins).state;
                rule.priority = (int) id(rule_0_priority).state;
                rule.display_mode = (int) id(rule_0_display_mode).state;
                rule.green_on = id(rule_0_green).state > 0;
                rule.red_on = id(rule_0_red).state > 0;
                break;
              case 1:
                rule.enabled = id(rule_1_enabled).state > 0;
                rule.start_mins = (int) id(rule_1_start_mins).state;
                rule.end_mins = (int) id(rule_1_end_mins).state;
                rule.priority = (int) id(rule_1_priority).state;
                rule.display_mode = (int) id(rule_1_display_mode).state;
                rule.green_on = id(rule_1_green).state > 0;
                rule.red_on = id(rule_1_red).state > 0;
                break;
              case 2:
                rule.enabled = id(rule_2_enabled).state > 0;
                rule.start_mins = (int) id(rule_2_start_mins).state;
                rule.end_mins = (int) id(rule_2_end_mins).state;
                rule.priority = (int) id(rule_2_priority).state;
                rule.display_mode = (int) id(rule_2_display_mode).state;
                rule.green_on = id(rule_2_green).state > 0;
                rule.red_on = id(rule_2_red).state > 0;
                break;
              case 3:
                rule.enabled = id(rule_3_enabled).state > 0;
                rule.start_mins = (int) id(rule_3_start_mins).state;
                rule.end_mins = (int) id(rule_3_end_mins).state;
                rule.priority = (int) id(rule_3_priority).state;
                rule.display_mode = (int) id(rule_3_display_mode).state;
                rule.green_on = id(rule_3_green).state > 0;
                rule.red_on = id(rule_3_red).state > 0;
                break;
              case 4:
                rule.enabled = id(rule_4_enabled).state > 0;
                rule.start_mins = (int) id(rule_4_start_mins).state;
                rule.end_mins = (int) id(rule_4_end_mins).state;
                rule.priority = (int) id(rule_4_priority).state;
                rule.display_mode = (int) id(rule_4_display_mode).state;
                rule.green_on = id(rule_4_green).state > 0;
                rule.red_on = id(rule_4_red).state > 0;
                break;
              case 5:
                rule.enabled = id(rule_5_enabled).state > 0;
                rule.start_mins = (int) id(rule_5_start_mins).state;
                rule.end_mins = (int) id(rule_5_end_mins).state;
                rule.priority = (int) id(rule_5_priority).state;
                rule.display_mode = (int) id(rule_5_display_mode).state;
                rule.green_on = id(rule_5_green).state > 0;
                rule.red_on = id(rule_5_red).state > 0;
                break;
              case 6:
                rule.enabled = id(rule_6_enabled).state > 0;
                rule.start_mins = (int) id(rule_6_start_mins).state;
                rule.end_mins = (int) id(rule_6_end_mins).state;
                rule.priority = (int) id(rule_6_priority).state;
                rule.display_mode = (int) id(rule_6_display_mode).state;
                rule.green_on = id(rule_6_green).state > 0;
                rule.red_on = id(rule_6_red).state > 0;
                break;
              case 7:
                rule.enabled = id(rule_7_enabled).state > 0;
                rule.start_mins = (int) id(rule_7_start_mins).state;
                rule.end_mins = (int) id(rule_7_end_mins).state;
                rule.priority = (int) id(rule_7_priority).state;
                rule.display_mode = (int) id(rule_7_display_mode).state;
                rule.green_on = id(rule_7_green).state > 0;
                rule.red_on = id(rule_7_red).state > 0;
                break;
              case 8:
                rule.enabled = id(rule_8_enabled).state > 0;
                rule.start_mins = (int) id(rule_8_start_mins).state;
                rule.end_mins = (int) id(rule_8_end_mins).state;
                rule.priority = (int) id(rule_8_priority).state;
                rule.display_mode = (int) id(rule_8_display_mode).state;
                rule.green_on = id(rule_8_green).state > 0;
                rule.red_on = id(rule_8_red).state > 0;
                break;
              case 9:
                rule.enabled = id(rule_9_enabled).state > 0;
                rule.start_mins = (int) id(rule_9_start_mins).state;
                rule.end_mins = (int) id(rule_9_end_mins).state;
                rule.priority = (int) id(rule_9_priority).state;
                rule.display_mode = (int) id(rule_9_display_mode).state;
                rule.green_on = id(rule_9_green).state > 0;
                rule.red_on = id(rule_9_red).state > 0;
                break;
            }
          };

          int current_mins = 0;
          if (id(test_mode).state) {
            int wake_start = (int) id(rule_0_start_mins).state;
            int wake_end = (int) id(rule_0_end_mins).state;
            int sleep_start = (int) id(rule_1_start_mins).state;
            int sleep_end = (int) id(rule_1_end_mins).state;
            switch (id(test_scenario_index)) {
              case 0:
                current_mins = sleep_start + (sleep_end - sleep_start + 1440) % 1440 / 2;
                current_mins = current_mins % 1440;
                break;
              case 1:
                current_mins = (sleep_start - 15 + 1440) % 1440;
                break;
              case 2:
                current_mins = (wake_start - 15 + 1440) % 1440;
                break;
              case 3:
                current_mins = (wake_end + 180) % 1440;
                break;
              case 4:
                current_mins = (wake_start + 45) % 1440;
                break;
              default:
                current_mins = (wake_end + 180) % 1440;
            }
            id(sched_valid) = true;
          } else {
            auto now = id(clock_time).now();
            if (!now.is_valid()) {
              id(sched_valid) = false;
              return;
            }
            current_mins = now.hour * 60 + now.minute;
            id(sched_valid) = true;
          }

          id(sched_mins) = current_mins;
          id(sched_hour) = current_mins / 60;
          id(sched_minute) = current_mins % 60;

          int best_rule = -1;
          int best_priority = 1000;
          RuleState best{};
          for (int i = 0; i < 10; i++) {
            RuleState rule{};
            load_rule(i, rule);
            if (!rule.enabled) {
              continue;
            }
            if (!in_rule_period(current_mins, rule.start_mins, rule.end_mins)) {
              continue;
            }
            if (rule.priority < best_priority) {
              best_priority = rule.priority;
              best_rule = i;
              best = rule;
            }
          }

          id(sched_active_rule) = best_rule;
          if (best_rule >= 0) {
            id(sched_display_mode) = best.display_mode;
            id(sched_green_on) = best.green_on;
            id(sched_red_on) = best.red_on;
          } else {
            id(sched_display_mode) = -1;
            id(sched_green_on) = false;
            id(sched_red_on) = false;
          }

  - id: update_signal_leds
    mode: restart
    then:
      - lambda: |-
          if (!id(sched_valid)) {
            id(green_led).turn_off();
            id(red_led).turn_off();
            return;
          }
          if (id(sched_green_on)) {
            id(green_led).turn_on();
          } else {
            id(green_led).turn_off();
          }
          if (id(sched_red_on)) {
            id(red_led).turn_on();
          } else {
            id(red_led).turn_off();
          }
