# Schedule rule engine — up to 10 time-window rules (ESP8266).
#
# Each rule: start and end time, priority, display mode,
# message, and LED states. When no rule matches, line 2 shows the greeting and LEDs are off.
#
# Display modes: 0 = full message line, 1 = greeting (prefix + name), 2 = alternate greeting/message

globals:
  - id: sched_active_rule
    type: int
    initial_value: "-1"
  - id: sched_display_mode
    type: int
    initial_value: "0"
  - id: sched_green_on
    type: bool
    initial_value: "false"
  - id: sched_red_on
    type: bool
    initial_value: "false"

number:
  - platform: template
    name: "Alternate Seconds"
    id: alternate_seconds
    optimistic: true
    restore_value: true
    initial_value: ${default_alternate_seconds}
    min_value: 2
    max_value: 60
    step: 1
    mode: slider
    icon: "mdi:swap-horizontal"
    unit_of_measurement: s
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 2

  # Rule 1 — default wake window
  - platform: template
    name: "Rule 1 Enabled"
    id: rule_0_enabled
    optimistic: true
    restore_value: true
    initial_value: ${default_rule_0_enabled}
    min_value: 0
    max_value: 1
    step: 1
    mode: box
    web_server:
      sorting_group_id: grp_rule_1
      sorting_weight: 1
  - platform: template
    name: "Rule 1 Start Minute Of Day"
    id: rule_0_start_mins
    optimistic: true
    restore_value: true
