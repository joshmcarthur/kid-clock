# Board: Wemos D1 Mini (ESP8266) (Wemos)
# Definition: definitions/boards/d1_mini/manifest.yaml
#
# 16x2 character LCD schedule clock with up to 10 configurable time-window rules.
# Standalone: SNTP time, captive portal WiFi, web UI configuration.
# Optional: Home Assistant via api: integration.
#
# Rule table (packages/schedule_rules.yaml): start/end time per rule, priority,
# display mode (0=message, 1=greeting, 2=alternate), LED states.

substitutions:
  web_assets_repo: "joshmcarthur/kid-clock"
  web_assets_version: "v1.0.0"
  timezone: Pacific/Auckland
  green_led_pin: GPIO12  # D6
  red_led_pin: GPIO13    # D7
  default_child_name: Sam
  default_alternate_seconds: "5"
  default_greeting_prefix: "Kia ora "
  rule_message_max_length: "64"
  # Rule 1 defaults (wake window)
  default_rule_0_enabled: "1"
  default_rule_0_start_mins: "420"
  default_rule_0_end_mins: "480"
  default_rule_0_priority: "10"
  default_rule_0_display_mode: "2"
  default_rule_0_green: "1"
  default_rule_0_red: "0"
  default_rule_0_message: "Time to wake up!"
  # Rule 2 defaults (sleep window)
  default_rule_1_enabled: "1"
  default_rule_1_start_mins: "1170"
  default_rule_1_end_mins: "1230"
  default_rule_1_priority: "10"
  default_rule_1_display_mode: "0"
  default_rule_1_green: "0"
  default_rule_1_red: "1"
  default_rule_1_message: "Time to sleep!"

packages:
  schedule_rules: !include packages/schedule_rules.yaml

esphome:
  name: kid-clock
  friendly_name: Kid Clock
  min_version: 2024.6.0
  project:
    name: "kid-clock.kid-clock"
    version: "1.0.0"
  on_boot:
    priority: -100
    then:
      - delay: 5s
      - script.execute: update_schedule_state
      - script.execute: update_signal_leds

globals:
  - id: test_scenario_index
    type: int
    initial_value: "0"
  - id: sched_valid
    type: bool
    initial_value: "false"
  - id: sched_mins
    type: int
    initial_value: "0"
  - id: sched_hour
    type: int
    initial_value: "0"
  - id: sched_minute
    type: int
    initial_value: "0"

esp8266:
  board: d1_mini

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: false
  frequency: 100kHz

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 8.5dB
  ap:
    ssid: kid-clock Fallback Hotspot
    password: "1dhB9LQPFdWk"

captive_portal:

web_server:
  port: 80
  version: 3
  log: false
  ota: false
  css_url: "https://cdn.jsdelivr.net/gh/${web_assets_repo}@${web_assets_version}/kid-clock-app.css"
  js_url: "https://cdn.jsdelivr.net/gh/${web_assets_repo}@${web_assets_version}/kid-clock-app.js"
  sorting_groups:
    - id: grp_display
      name: "Display"
      sorting_weight: 10
    - id: grp_rule_1
      name: "Rule 1"
      sorting_weight: 20
    - id: grp_rule_2
      name: "Rule 2"
      sorting_weight: 30
    - id: grp_rule_3
      name: "Rule 3"
      sorting_weight: 40
    - id: grp_rule_4
      name: "Rule 4"
      sorting_weight: 50
    - id: grp_rule_5
      name: "Rule 5"
      sorting_weight: 60
    - id: grp_rule_6
      name: "Rule 6"
      sorting_weight: 70
    - id: grp_rule_7
      name: "Rule 7"
      sorting_weight: 75
    - id: grp_rule_8
      name: "Rule 8"
      sorting_weight: 78
    - id: grp_rule_9
      name: "Rule 9"
      sorting_weight: 79
    - id: grp_rule_10
      name: "Rule 10"
      sorting_weight: 80
    - id: grp_test
      name: "Test Mode"
      sorting_weight: 80
    - id: grp_lights
      name: "Indicator Lights"
      sorting_weight: 90

time:
  - platform: sntp
    id: clock_time
    timezone: ${timezone}
    servers:
      - 0.nz.pool.ntp.org
      - 1.nz.pool.ntp.org
      - 2.nz.pool.ntp.org

text:
  - platform: template
    name: "Child Name"
    id: child_name
    optimistic: true
    restore_value: true
    initial_value: ${default_child_name}
    min_length: 1
    max_length: 8
    mode: text
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 1

switch:
  - platform: template
    name: "Test Mode"
    id: test_mode
    optimistic: true
    icon: "mdi:test-tube"
    web_server:
      sorting_group_id: grp_test
      sorting_weight: 1
    turn_on_action:
      - script.execute: update_schedule_state
      - script.execute: update_signal_leds
      - component.update: lcd_display
    turn_off_action:
      - script.execute: update_schedule_state
      - script.execute: update_signal_leds
      - component.update: lcd_display

  - platform: template
    name: "Test Auto Cycle"
    id: test_auto_cycle
    optimistic: true
    icon: "mdi:autorenew"
    web_server:
      sorting_group_id: grp_test
      sorting_weight: 2

  - platform: gpio
    pin: ${green_led_pin}
    id: green_led
    name: "Wake LED"
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 1

  - platform: gpio
    pin: ${red_led_pin}
    id: red_led
    name: "Sleep LED"
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: grp_lights
      sorting_weight: 2

button:
  - platform: template
    name: "Test Next Scenario"
    id: test_next_scenario
    icon: "mdi:skip-next"
    web_server:
      sorting_group_id: grp_test
      sorting_weight: 3
    on_press:
      - lambda: |-
          id(test_scenario_index) = (id(test_scenario_index) + 1) % 5;
      - script.execute: update_schedule_state
      - script.execute: update_signal_leds
      - component.update: lcd_display

text_sensor:
  - platform: template
    name: "Test Scenario"
    id: test_scenario_label
    icon: "mdi:information-outline"
    web_server:
      sorting_group_id: grp_test
      sorting_weight: 4
    lambda: |-
      if (!id(test_mode).state) {
        return std::string("Live");
      }
      switch (id(test_scenario_index)) {
        case 0: return std::string("Sleep window");
        case 1: return std::string("Before sleep");
        case 2: return std::string("Before wake");
        case 3: return std::string("No rule");
        case 4: return std::string("Wake window");
        default: return std::string("Unknown");
      }
    update_interval: 1s

  - platform: template
    name: "Active Rule"
    id: active_rule_label
    icon: "mdi:clock-check"
    web_server:
      sorting_group_id: grp_test
      sorting_weight: 5
    lambda: |-
      if (!id(sched_valid)) {
        return std::string("No time");
      }
      int rule = id(sched_active_rule);
      if (rule < 0) {
        return std::string("None");
      }
      char buf[16];
      snprintf(buf, sizeof(buf), "Rule %d", rule + 1);
      return std::string(buf);
    update_interval: 1s

interval:
  - interval: 1s
    then:
      - script.execute: update_schedule_state
      - script.execute: update_signal_leds
  - interval: 8s
    then:
      - if:
          condition:
            and:
              - switch.is_on: test_mode
              - switch.is_on: test_auto_cycle
          then:
            - lambda: |-
                id(test_scenario_index) = (id(test_scenario_index) + 1) % 5;
            - script.execute: update_schedule_state
            - script.execute: update_signal_leds
            - component.update: lcd_display

display:
  - platform: lcd_pcf8574
    id: lcd_display
    dimensions: 16x2
    address: 0x3F
    update_interval: 1s
    lambda: |-
      auto show_static_line = [&](uint8_t row, const std::string &text) {
        if (text.empty()) {
          it.print(0, row, "                ");
          return;
        }
        if (text.length() <= 16) {
          int col = (16 - (int) text.length()) / 2;
          if (col < 0) {
            col = 0;
          }
          it.print(col, row, text.c_str());
          return;
        }
        std::string scroll = text + "      ";
        size_t scroll_len = scroll.length();
        size_t pos = (millis() / 1500) % scroll_len;
        std::string out;
        out.reserve(16);
        for (int i = 0; i < 16; i++) {
          out += scroll[(pos + i) % scroll_len];
        }
        it.print(0, row, out.c_str());
      };

      auto show_greeting = [&](uint8_t row) {
        std::string text = id(greeting_prefix).state + id(child_name).state;
        show_static_line(row, text);
      };

      auto get_rule_message = [&](int index) -> std::string {
        switch (index) {
          case 0: return id(rule_0_message).state;
          case 1: return id(rule_1_message).state;
          case 2: return id(rule_2_message).state;
          case 3: return id(rule_3_message).state;
          case 4: return id(rule_4_message).state;
          case 5: return id(rule_5_message).state;
          case 6: return id(rule_6_message).state;
          case 7: return id(rule_7_message).state;
          case 8: return id(rule_8_message).state;
          case 9: return id(rule_9_message).state;
          default: return std::string("");
        }
      };

      if (!id(sched_valid)) {
        it.print(1, 0, "Getting time...");
        return;
      }

      int h24 = id(sched_hour);
      int minute = id(sched_minute);
      int h12 = h24 % 12;
      if (h12 == 0) {
        h12 = 12;
      }
      const char *ampm = h24 >= 12 ? "PM" : "AM";

      auto show_clock = [&](uint8_t row) {
        it.printf(4, row, "%2d:%02d %s", h12, minute, ampm);
      };

      show_clock(0);

      int active_rule = id(sched_active_rule);
      if (active_rule >= 0) {
        int mode = id(sched_display_mode);
        std::string msg = get_rule_message(active_rule);
        if (mode == 1) {
          show_greeting(1);
        } else if (mode == 2) {
          int alt_secs = (int) id(alternate_seconds).state;
          if (alt_secs < 2) {
            alt_secs = 2;
          }
          bool show_message;
          if (id(test_mode).state) {
            show_message = (millis() / (alt_secs * 1000)) % 2 == 1;
          } else {
            auto now = id(clock_time).now();
            show_message = now.is_valid() && (((int) now.timestamp / alt_secs) % 2 == 1);
          }
          if (show_message) {
            show_static_line(1, msg);
          } else {
            show_greeting(1);
          }
        } else {
          show_static_line(1, msg);
        }
      } else {
        show_greeting(1);
      }
